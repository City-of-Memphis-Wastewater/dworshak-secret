# File: .github/workflows/publish.yaml

name: Publish to PyPI and GitHub

on:
  release:
    types: [published]

jobs:
  pypi-publish:
    name: Build, upload to PyPI, check, distribute to release
    runs-on: ubuntu-latest

    environment: pypi  # Optional but recommended: create this environment in repo settings

    permissions:
      id-token: write   # Required for Trusted Publishing (OIDC)
      contents: write    # Needed attach files to release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0  # Full history needed for version detection from git tags

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install uv
        run: pip install --upgrade uv
        
      - name: Build package (sdist + wheel)
        run: uv build

      - name: Install the built package (sanity check)
        run: uv pip install dist/*.whl --system

      - name: Run Tests
        if: false
        run: uv run --dev pytest

      - name: Test CLI entrypoint (Sanity Check)
        run: |
          uv run dworshak-secret --version
          uv run dworshak-secret --help
        
      - name: Test library access
        if: true
        run: |
          python -c "from dworshak_secret import DworshakSecret; help(DworshakSecret)"

      - name: Generate Checksums
        run: |
          cd dist
          sha256sum * > checksums.txt
          echo "Generated SHA256 hashes for build artifacts."

      - name: Attach artifacts to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.whl
            dist/*.tar.gz
            dist/checksums.txt
      
      - name: Remove non-dist files for PyPI
        run: rm dist/checksums.txt

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Trusted Publishing: no token needed — uses OIDC automatically
